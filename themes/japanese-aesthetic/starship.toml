# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"
# Config
command_timeout = 3000
# Disable the blank line at the start of the prompt
add_newline = false
format = """
$character\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
[¯é░ ](prev_bg)
"""

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:#3c3836 bg:prev_fg"
format = "[$symbol]($style)"
disabled = false  # Disabled by default

[os.symbols]
Arch = "¾░úç "
EndeavourOS = "´îó "
Linux = "¯£Æ "
NixOS = "´îô "
Ubuntu = "´îø "
Windows = "¯£Å "

[username]
style_user = "fg:#3c3836 bg:prev_bg"
style_root = "fg:#3c3836 bg:prev_bg"
format = "[ $user]($style)"
aliases = { "root" = "command" }

[hostname]
style = "fg:#3c3836 bg:prev_bg"
ssh_only = true
format = "[@$hostname]($style)"

[directory]
style = "fg:#3c3836 bg:prev_bg"
format = "[ $path]($style)"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Contacts" = "´è╣ "
"Kontakter" = "´è╣ "
"Desktop" = "´äê "
"Skrivebord" = "´äê "
"Documents" = "¾░êÖ "
"Dokumenter" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Nedlastinger" = "´ÇÖ "
"Movies" = "´Çê "
"Filmer" = "´Çê "
"Music" = "´Çü "
"Musikk" = "´Çü "
"OneDrive" = "´âé "
"Pictures" = "´Ç¥ "
"Bilder" = "´Ç¥ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░êÖ´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░êÖ " = " ¾░êÖ´ä¬ "

[vcs]
order = ["jujutsu", "git"]
jujutsu_modules = "$jujutsu_state"

# VCS Branch
[git_branch]
symbol = "´Éÿ "
style = "fg:#3c3836 bg:prev_bg"
format = "[ $symbol$branch]($style)"

[git_state]
rebase = "´ôø "
merge = "¯½¥ "
revert = "¾░òì "
cherry_pick = "¯èø "
bisect = "¾░òØ "
am = "¾░ø« "
am_or_rebase = "¾░ø« /´ôø "
style = "fg:#3c3836 bg:prev_bg"
format = ' \([$state($progress_current/$progress_total)]($style)\)'

[git_status]
disabled = false
style = "fg:#3c3836 bg:prev_bg"
format = "[ $all_status$ahead_behind]($style)"

[jujutsu_state]
disabled = false
style = "fg:#3c3836 bg:prev_bg"

[character]
success_symbol = "[¯éÂ](fg:#fbf1c7)"
error_symbol = "[¯éÂ](#c14a4a)"
vimcmd_symbol = "[¯éÂ](#3c3836)"
format = "$symbol"

