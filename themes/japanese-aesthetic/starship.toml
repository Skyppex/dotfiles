# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Config
command_timeout = 3000

# Disable the blank line at the start of the prompt
add_newline = false

format = """
$character\
$os\
$username\
$hostname\
$directory\
$vcs\
[Ņé░ ](prev_bg)
"""

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:#3c3836 bg:prev_fg"
format = "[$symbol]($style)"
disabled = false                # Disabled by default

[os.symbols]
Arch = "¾░Żć "
EndeavourOS = "’īó "
Linux = "Ņ£Æ "
NixOS = "’īō "
Ubuntu = "’īø "
Windows = "Ņ£Å "

[username]
style_user = "fg:#3c3836 bg:prev_bg"
style_root = "fg:#3c3836 bg:prev_bg"
format = "[ $user]($style)"
aliases = { "root" = "command" }

[hostname]
style = "fg:#3c3836 bg:prev_bg"
ssh_only = true
format = "[@$hostname]($style)"

[directory]
style = "fg:#3c3836 bg:prev_bg"
format = "[ $path]($style)"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Contacts" = "’Ŗ╣ "
"Kontakter" = "’Ŗ╣ "
"Desktop" = "’äł "
"Skrivebord" = "’äł "
"Documents" = "¾░łÖ "
"Dokumenter" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Nedlastinger" = "’ĆÖ "
"Movies" = "’Ćł "
"Filmer" = "’Ćł "
"Music" = "’Ćü "
"Musikk" = "’Ćü "
"OneDrive" = "’āé "
"Pictures" = "’ĆŠ "
"Bilder" = "’ĆŠ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░łÖ’ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░łÖ " = " ¾░łÖ’ä¬ "

[vcs]
order = ["jujutsu", "git"]
jujutsu_modules="$jujutsu_closest_bookmarks$jujutsu_state$jujutsu_status"
git_modules="$git_branch$git_status"

# VCS Branch
[git_branch]
symbol = "’Éś "
style = "fg:#3c3836 bg:prev_bg"
format = '[ $symbol$branch]($style)'

[git_state]
rebase = "’ōø "
merge = "Ņ½Š "
revert = "¾░ĢŹ "
cherry_pick = "ŅŖø "
bisect = "¾░ĢØ "
am = "¾░ø« "
am_or_rebase = "¾░ø« /’ōø "
style = "fg:#3c3836 bg:prev_bg"
format = ' \([$state($progress_current/$progress_total)]($style)\)'

[git_status]
disabled = false
style = "fg:#3c3836 bg:prev_bg"
format = '[ $all_status$ahead_behind]($style)'

[jujutsu_bookmark]
disabled = false
symbol = "’Ć« "
style = "fg:#3c3836 bg:prev_bg"
format = '[$symbol$bookmarks]($style)'

[jujutsu_change]
disabled = false
style = "fg:#3c3836 bg:prev_bg"
format = '[ $symbol$change_id]($style)'

[jujutsu_closest_bookmarks]
disabled = false
symbol = "’Ć« "
style = "fg:#3c3836 bg:prev_bg"
format = '[ $symbol$bookmarks ]($style)'

[jujutsu_commit]
disabled = false
style = "fg:#3c3836 bg:prev_bg"
format = '[ $symbol$commit]($style)'

[jujutsu_state]
disabled = false
style = "fg:#3c3836 bg:prev_bg"
conflicted = "’ü▒ "
conflicted_style = "fg:#3c3836 bg:prev_bg"
divergent = "¾░ōü "
divergent_style = "fg:#3c3836 bg:prev_bg"
hidden = "¾░śō "
hidden_style = "fg:#3c3836 bg:prev_bg"
immutable = "’ĆŻ "
immutable_style = "fg:#3c3836 bg:prev_bg"
format = '[$conflicted]($conflicted_style)[$divergent]($divergent_style)[$hidden]($hidden_style)[$immutable]($immutable_style)[ ]($style)'

[jujutsu_status]
disabled = false
style = "fg:#3c3836 bg:prev_bg"
format = '[$all_status]($style)'

[character]
success_symbol = "[ŅéČ](fg:#fbf1c7)"
error_symbol = "[ŅéČ](#c14a4a)"
vimcmd_symbol = "[ŅéČ](#3c3836)"
format = "$symbol"